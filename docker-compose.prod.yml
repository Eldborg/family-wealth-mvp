version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: family_wealth_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: family_wealth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_beta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: family_wealth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: family_wealth_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres_password_beta@postgres:5432/family_wealth
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      NEXT_PUBLIC_API_URL: http://web:3000/api
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: family_wealth_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: family_wealth_network
